name: Deploy to GitHub Pages

# Every push to main publishes the calculator to GitHub Pages.
on:
  push:
    branches: [main]
  workflow_dispatch: # lets you deploy manually from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Only run one deploy at a time.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        # The whole repo is the site — it's plain HTML/CSS/JS, no build step.
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
